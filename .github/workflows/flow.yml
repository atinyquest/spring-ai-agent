name: Block invalid PRs to production

on:
  pull_request:
    branches:
      - production

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not from release/* or hotfix/*
        run: |
          echo "🔍 PR Source Branch: ${{ github.head_ref }}"
          if [[ "${{ github.head_ref }}" != release/* && "${{ github.head_ref }}" != hotfix/* ]]; then
            echo "❌ Only release/* or hotfix/* branches can merge into production."
            exit 1
          fi
